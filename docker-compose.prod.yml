# Standalone production compose file — used on VPS only.
# Does NOT extend docker-compose.yml to avoid dev bind-mount inheritance.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dentist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dentist_db}
      POSTGRES_USER: ${POSTGRES_USER:-dentist_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentist_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dentist_network

  backend:
    image: ${BACKEND_IMAGE}
    container_name: dentist_backend
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-8080}
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_RECIPIENT: ${EMAIL_RECIPIENT:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      UPLOAD_PATH: /app/uploads
      UPLOAD_URL_PREFIX: /uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dentist_network

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: dentist_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - dentist_network

  nginx:
    image: nginx:alpine
    container_name: dentist_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ${NGINX_SSL_PATH:-./nginx/ssl}:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dentist_network

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  dentist_network:
    driver: bridge
