version: '3.8'

services:
  # PostgreSQL - production settings
  postgres:
    # Don't expose port externally in production
    ports: []
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Backend - production optimizations
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - CGO_ENABLED=0
    # Don't expose port externally (nginx handles this)
    ports: []
    environment:
      ENVIRONMENT: production
      FRONTEND_URL: ${FRONTEND_URL}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Frontend - production build
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Nginx - production settings
  nginx:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
